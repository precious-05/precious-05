<svg width="1200" height="1860" viewBox="0 0 1200 1860" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Alina Liaquat - AI and Machine Learning profile</title>
  <desc id="desc">A dark neon portfolio README card for Alina Liaquat, featuring AI, machine learning, deep learning, NLP, projects, tools, and builds.</desc>
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1200" y2="1860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0618"/>
      <stop offset="0.48" stop-color="#130922"/>
      <stop offset="1" stop-color="#070411"/>
    </linearGradient>
    <radialGradient id="containerGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 90) rotate(90) scale(900 640)">
      <stop stop-color="#2A1249"/>
      <stop offset="0.62" stop-color="#12091F"/>
      <stop offset="1" stop-color="#0A0618"/>
    </radialGradient>
    <linearGradient id="purpleLine" x1="128" y1="0" x2="1072" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#140021"/>
      <stop offset="0.5" stop-color="#3C096C"/>
      <stop offset="1" stop-color="#9D4EDD"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="540" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F2D9FF"/>
      <stop offset="0.48" stop-color="#C08CFA"/>
      <stop offset="1" stop-color="#9D4EDD"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0" y1="0" x2="920" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1B998B"/>
      <stop offset="0.5" stop-color="#38F8C7"/>
      <stop offset="1" stop-color="#F46036"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <filter id="purpleGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="11" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="clip">
      <rect x="42" y="34" width="1116" height="1792" rx="44"/>
    </clipPath>
    <style>
      .font { font-family: Inter, Segoe UI, Arial, sans-serif; }
      .mono { font-family: SFMono-Regular, Consolas, Liberation Mono, monospace; }
      .small { font-size: 19px; font-weight: 600; letter-spacing: .2px; }
      .body { font-size: 22px; font-weight: 400; fill: #CBC2E0; }
      .muted { fill: #B8A6D9; }
      .sub { font-size: 19px; font-weight: 700; fill: #B290DA; }
      .pillText { font-size: 18px; font-weight: 700; fill: #D6C2FC; }
      .chipText { font-size: 17px; font-weight: 700; fill: #CBB7F0; }
      .cardTitle { font-size: 30px; font-weight: 800; fill: #DCC9FF; }
      .section { font-size: 39px; font-weight: 850; fill: url(#titleGrad); }
      .panel { fill: #120A23; fill-opacity: .73; stroke: #9D4EDD; stroke-opacity: .18; stroke-width: 1.5; }
      .card { fill: #120A23; fill-opacity: .78; stroke: #9D4EDD; stroke-opacity: .18; stroke-width: 1.5; }
      .pill { fill: #1B1031; fill-opacity: .82; stroke: #9D4EDD; stroke-opacity: .25; stroke-width: 1.2; }
      .chip { fill: #24123F; fill-opacity: .78; stroke: #9D4EDD; stroke-opacity: .22; stroke-width: 1.1; }
      .tool { font-size: 19px; font-weight: 800; fill: #E4D8FF; }
      .codeKey { fill: #B48AD9; font-weight: 800; }
      .codeString { fill: #7FC9A8; }
      .gridCell { stroke: #202A4D; stroke-width: 1; rx: 3.5; }
      .off { fill: #151B34; }
      .low { fill: #194B5C; }
      .mid { fill: #1B998B; }
      .high { fill: #38F8C7; }
      .hot { fill: #F46036; }
    </style>
