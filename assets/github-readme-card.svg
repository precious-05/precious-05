    <g transform="translate(98 894)">
      <g>
        <rect x="0" y="0" width="486" height="190" rx="28" class="card"/>
        <text x="28" y="48" class="cardTitle">Bazgar AI</text>
        <text x="28" y="80" class="sub">Apple Disease Detection - Smart Farming</text>
        <text x="28" y="118" class="body">Full-stack AI for Balochi farmers: leaf disease</text>
        <text x="28" y="149" class="body">diagnostics, treatment guidance, voice support,</text>
        <text x="28" y="180" class="body">and UCB1 reinforcement crop assistant.</text>
      </g>
      <g transform="translate(518 0)">
        <rect x="0" y="0" width="486" height="190" rx="28" class="card"/>
        <text x="28" y="48" class="cardTitle">EcoSafe AI</text>
        <text x="28" y="80" class="sub">Forest Fire Detection &amp; Risk Analysis</text>
        <text x="28" y="118" class="body">Offline-first Android app with risk mapping,</text>
        <text x="28" y="149" class="body">CameraX capture, TensorFlow Lite fire</text>
        <text x="28" y="180" class="body">classification, and FastAPI backend.</text>
      </g>
      <g transform="translate(0 218)">
        <rect x="0" y="0" width="486" height="190" rx="28" class="card"/>
        <text x="28" y="48" class="cardTitle">ThyroAssess AI</text>
        <text x="28" y="80" class="sub">Thyroid Cancer Risk Assessment</text>
        <text x="28" y="118" class="body">ML web app trained on 200K+ records with</text>
        <text x="28" y="149" class="body">EDA, Logistic Regression, FastAPI, MongoDB,</text>
        <text x="28" y="180" class="body">and Vercel deployment.</text>
      </g>
      <g transform="translate(518 218)">
        <rect x="0" y="0" width="486" height="190" rx="28" class="card"/>
        <text x="28" y="48" class="cardTitle">MediNomix</text>
        <text x="28" y="80" class="sub">Medication Error Prevention</text>
        <text x="28" y="118" class="body">Clinical database for LASA medication errors:</text>
        <text x="28" y="149" class="body">phonetic similarity, OpenFDA ETL, Streamlit,</text>
        <text x="28" y="180" class="body">and Neon PostgreSQL.</text>
      </g>
      <g transform="translate(0 436)">
        <rect x="0" y="0" width="486" height="190" rx="28" class="card"/>
        <text x="28" y="48" class="cardTitle">Prosperous Farmer</text>
        <text x="28" y="80" class="sub">Agriculture Data Web App</text>
        <text x="28" y="118" class="body">Bilingual Urdu-English dashboard for crop</text>
        <text x="28" y="149" class="body">tracking, CRUD, CSV exports, and interactive</text>
        <text x="28" y="180" class="body">yield analytics.</text>
      </g>
      <g transform="translate(518 436)">
        <rect x="0" y="0" width="486" height="190" rx="28" class="card"/>
        <text x="28" y="48" class="cardTitle">Dakati Game</text>
        <text x="28" y="80" class="sub">Dacoit-Themed Social Deduction</text>
        <text x="28" y="118" class="body">Cross-platform game with Kivy GUI, circular</text>
        <text x="28" y="149" class="body">layout, voting logic, and Android packaging.</text>
      </g>
    </g>

