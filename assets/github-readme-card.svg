      <text x="332" y="72" font-size="36" font-weight="850" fill="url(#titleGrad)">Alina Liaquat</text>
      <text x="332" y="116" class="body">Computer Science undergraduate building practical AI,</text>
      <text x="332" y="148" class="body">machine learning, and data-driven applications. I turn</text>
      <text x="332" y="180" class="body">real-world problems into working systems across agriculture,</text>
      <text x="332" y="212" class="body">clinical safety, health prediction, and interactive ML products.</text>
    </g>

